{% extends "base.html" %}
{% load static %}

{% block title %}Page Not Found | JCF Management{% endblock %}

{% block body %}
<div class="auth-box d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 text-center">
                <h1 class="display-1 fw-bold text-primary">404</h1>
                <h3 class="fw-semibold mb-3">Page Not Found</h3>
                <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
                <a href="{% url 'dashboard:analytics' %}" class="btn btn-primary">
                    <i class="ti ti-home me-1"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
