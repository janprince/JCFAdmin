databases:
  - name: jcf
    plan: free
    databaseName: jcf
    user: jan

services:
  - type: web
    plan: free
    name: jcf
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'gunicorn config.wsgi:application'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jcf
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHON_VERSION
        value: 3.13.0
